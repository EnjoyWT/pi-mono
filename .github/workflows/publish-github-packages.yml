name: Publish GitHub Packages

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          npm --prefix packages/tui run build
          npm --prefix packages/ai run build
          npm --prefix packages/agent run build
          npm --prefix packages/coding-agent run build

      - name: Publish @enjoywt/pi-ai
        run: npm publish --workspace packages/ai
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @enjoywt/pi-agent-core
        run: npm publish --workspace packages/agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @enjoywt/pi-coding-agent
        run: npm publish --workspace packages/coding-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
